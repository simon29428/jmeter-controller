---
# Controller config — mount this file via ConfigMap and pass --config=/etc/jmeter/config.yaml

# runGroupLimits: max concurrently Running TestRuns per run group name.
# Groups not listed here default to a limit of 1.
runGroupLimits:
  group-a: 2
  group-b: 1

# podTemplate: base template applied to every slave pod.
# The controller always overrides: labels, restartPolicy=Never,
# the "jmeter-slave" container image, and TESTRUN_NAME/RUN_GROUP/THREAD_COUNT env vars.
# All other fields below are applied as-is.
podTemplate:
  metadata:
    annotations:
      prometheus.io/scrape: "false"
  spec:
    terminationGracePeriodSeconds: 30
    tolerations:
      - key: "jmeter"
        operator: "Equal"
        value: "slave"
        effect: "NoSchedule"
    containers:
      - name: jmeter-slave        # must be named "jmeter-slave"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        volumeMounts:
          - name: jmeter-scripts
            mountPath: /scripts
    volumes:
      - name: jmeter-scripts
        configMap:
          name: jmeter-scripts
