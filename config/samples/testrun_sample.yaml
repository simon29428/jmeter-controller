---
apiVersion: jmeter.io/v1
kind: TestRun
metadata:
  name: example-testrun
  namespace: default
spec:
  slave:
    image: nginx:latest
    mounts:
      - name: jmeter-scripts
        mountPath: /scripts
        configMap: jmeter-scripts     # mount a ConfigMap
  master:
    image: nginx:latest
    # env vars are injected before SCRIPT_PATH / REPORT_PATH,
    # so they can be referenced via $(VAR_NAME) in those fields.
    env:
      - name: BASE_DIR
        value: /scripts
      - name: REPORT_DIR
        value: /reports
    scriptPath: $(BASE_DIR)/test-plan.jmx   # parameterized via $(BASE_DIR)
    reportPath: $(REPORT_DIR)/output        # parameterized via $(REPORT_DIR)
    mounts:
      - name: jmeter-scripts
        mountPath: /scripts
        configMap: jmeter-scripts
  runGroups:
    group-a:
      thread: 120         # ceil(120/50) = 3 pods; pod-0 50t, pod-1 50t, pod-2 20t
      base: 50
      nodeSelector:
        kubernetes.io/os: linux
    group-b:
      thread: 80          # ceil(80/50) = 2 pods; pod-0 50t, pod-1 30t
      # base defaults to 50
