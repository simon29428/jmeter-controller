---
apiVersion: jmeter.io/v1
kind: TestRun
metadata:
  name: example-testrun
  namespace: jmeter-system
spec:
  slave:
    image: ghcr.io/simon29428/jmeter-controller-jmeter:base-v1.0.2
  master:
    image: ghcr.io/simon29428/jmeter-controller-jmeter:base-v1.0.2
    # env vars are injected before SCRIPT_PATH / REPORT_PATH,
    # so they can be referenced via $(VAR_NAME) in those fields.
    env:
      - name: BASE_DIR
        value: /test-plan
    scriptPath: $(BASE_DIR)/test-plan.jmx   # parameterized via $(BASE_DIR)
    reportPath: $(BASE_DIR)/report          # parameterized via $(BASE_DIR)
    mounts:
      - name: test-plan-pvc
        claimName: test-plan-pvc
        mountPath: /test-plan/
  runGroups:
    emv:
      thread: 120         # ceil(120/50) = 3 pods; pod-0 50t, pod-1 50t, pod-2 20t
      base: 50
      nodeSelector:
        kubernetes.io/os: linux

