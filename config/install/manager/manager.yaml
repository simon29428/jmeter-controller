---
apiVersion: v1
kind: Namespace
metadata:
  name: jmeter-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jmeter-controller
  namespace: jmeter-system
  labels:
    app: jmeter-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jmeter-controller
  template:
    metadata:
      labels:
        app: jmeter-controller
    spec:
      serviceAccountName: jmeter-controller
      containers:
      - name: controller
        image: jmeter-controller:latest
        imagePullPolicy: IfNotPresent
        args:
        - --config=/etc/jmeter/config.yaml
        - --api-port=8080
        - --metrics-bind-address=:8081
        - --health-probe-bind-address=:8082
        ports:
        - name: api
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - name: config
          mountPath: /etc/jmeter
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: jmeter-controller-config
---
apiVersion: v1
kind: Service
metadata:
  name: jmeter-controller-api
  namespace: jmeter-system
spec:
  selector:
    app: jmeter-controller
  ports:
  - name: api
    port: 8080
    targetPort: api
    protocol: TCP
  type: ClusterIP
