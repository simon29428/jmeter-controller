apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ./manager/manager.yaml
- ./rbac/rbac.yaml
- ./crd/jmeter.io_testruns.yaml
- ./jmeter-scripts/

configMapGenerator:
- name: jmeter-controller-config
  namespace: jmeter-system
  files:
  - manager/config.yaml


images:
- name: jmeter-controller
  newName: ghcr.io/simon29428/jmeter-controller-main
  newTag: v1.0.3
