---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: testruns.jmeter.jmeter.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
spec:
  group: jmeter.jmeter.io
  names:
    kind: TestRun
    listKind: TestRunList
    plural: testruns
    shortNames:
    - tr
    singular: testrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: TestRun is the Schema for the testruns API
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: TestRunSpec defines the desired state of TestRun
            properties:
              runGroups:
                additionalProperties:
                  description: RunGroupConfig defines the configuration for a single run group
                  properties:
                    base:
                      description: Base is the number of threads per pod. Defaults to 50.
                      minimum: 1
                      type: integer
                    nodeSelector:
                      additionalProperties:
                        type: string
                      description: NodeSelector is an optional node selector applied to all pods in this run group
                      type: object
                    thread:
                      description: Thread is the total number of threads for this run group
                      minimum: 1
                      type: integer
                  required:
                  - thread
                  type: object
                description: RunGroups is a map of run group name to its configuration
                minProperties: 1
                type: object
              slave:
                description: Slave defines the configuration for JMeter worker (slave) pods.
                properties:
                  image:
                    description: Image is the container image used for JMeter slave pods.
                    minLength: 1
                    type: string
                  mounts:
                    description: Mounts defines additional volumes (ConfigMap or PVC) to mount into slave pods.
                    items:
                      description: MountSpec defines a volume to be mounted into pods.
                      properties:
                        configMap:
                          description: ConfigMap is the name of the ConfigMap to mount. Mutually exclusive with PVC.
                          type: string
                        mountPath:
                          description: MountPath is the absolute path in the container where the volume is mounted.
                          minLength: 1
                          type: string
                        name:
                          description: Name is the unique name for this volume, used as the Kubernetes volume name.
                          minLength: 1
                          type: string
                        pvc:
                          description: PVC is the name of the PersistentVolumeClaim to mount. Mutually exclusive with ConfigMap.
                          type: string
                      required:
                      - mountPath
                      - name
                      type: object
                    type: array
                required:
                - image
                type: object
              master:
                description: Master defines the configuration for the JMeter master pod. When set, the controller waits for all worker pods to become Ready, then creates a single master pod with SLAVE_HOSTS set to the comma-separated list of worker IP addresses.
                properties:
                  image:
                    description: Image is the container image used for the JMeter master pod.
                    minLength: 1
                    type: string
                  scriptPath:
                    description: ScriptPath is the path to the JMeter test script (.jmx) to execute. Passed to the master container as the SCRIPT_PATH environment variable.
                    minLength: 1
                    type: string
                  mounts:
                    description: Mounts defines additional volumes (ConfigMap or PVC) to mount into the master pod.
                    items:
                      description: MountSpec defines a volume to be mounted into pods.
                      properties:
                        configMap:
                          description: ConfigMap is the name of the ConfigMap to mount. Mutually exclusive with PVC.
                          type: string
                        mountPath:
                          description: MountPath is the absolute path in the container where the volume is mounted.
                          minLength: 1
                          type: string
                        name:
                          description: Name is the unique name for this volume, used as the Kubernetes volume name.
                          minLength: 1
                          type: string
                        pvc:
                          description: PVC is the name of the PersistentVolumeClaim to mount. Mutually exclusive with ConfigMap.
                          type: string
                      required:
                      - mountPath
                      - name
                      type: object
                    type: array
                required:
                - image
                - scriptPath
                type: object
            required:
            - runGroups
            - slave
            type: object
          status:
            description: TestRunStatus defines the observed state of TestRun
            properties:
              message:
                description: Message is a human-readable message indicating details about the current phase
                type: string
              phase:
                description: Phase is the current phase of the TestRun
                enum:
                - Pending
                - Waiting
                - WorkersReady
                - Running
                - Completed
                - Failed
                type: string
              pods:
                description: Pods contains information about all worker pods managed by this TestRun
                items:
                  description: PodInfo holds information about a single slave pod
                  properties:
                    ip:
                      description: IP is the pod IP address
                      type: string
                    name:
                      description: Name is the pod name
                      type: string
                    phase:
                      description: Phase is the current phase of the pod
                      type: string
                    runGroup:
                      description: RunGroup is the run group this pod belongs to
                      type: string
                    threadCount:
                      description: ThreadCount is the number of threads assigned to this pod
                      type: integer
                  required:
                  - name
                  - runGroup
                  - threadCount
                  type: object
                type: array
              masterPod:
                description: MasterPod contains information about the master pod, if one has been created
                properties:
                  ip:
                    description: IP is the pod IP address
                    type: string
                  name:
                    description: Name is the pod name
                    type: string
                  phase:
                    description: Phase is the current phase of the pod
                    type: string
                  runGroup:
                    description: RunGroup is the run group this pod belongs to
                    type: string
                  threadCount:
                    description: ThreadCount is the number of threads assigned to this pod
                    type: integer
                required:
                - name
                - runGroup
                - threadCount
                type: object
              startTime:
                description: StartTime is the time when the TestRun transitioned into Running phase
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
